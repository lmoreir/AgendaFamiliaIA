# Ambiente de desenvolvimento local
# Uso: docker-compose up -d

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agenda_familia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agenda_familia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agenda_familia_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Opcional: Mailhog para testar e-mails localmente
  mailhog:
    image: mailhog/mailhog:latest
    container_name: agenda_familia_mail
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # UI web

volumes:
  postgres_data:
  redis_data:
